<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tablero de operación de almacén</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel2:#1d212a;
    --border:#2a2f3a;
    --text:#e8eaed;
    --text2:#9aa1ad;
    --text3:#5f6675;
    --accent:#3b82f6;
    --green:#22c55e;
    --amber:#f59e0b;
    --red:#ef4444;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:80px;
  }
  header{
    position:sticky;top:0;z-index:20;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:10px 14px;
  }
  .hrow{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  h1{font-size:15px;font-weight:600;margin:0;}
  .updated{font-size:11px;color:var(--text3);}
  nav{
    display:flex;gap:6px;overflow-x:auto;margin-top:10px;padding-bottom:2px;
    -webkit-overflow-scrolling:touch;
  }
  nav::-webkit-scrollbar{display:none;}
  nav button{
    flex:0 0 auto;
    background:var(--panel);
    color:var(--text2);
    border:1px solid var(--border);
    border-radius:20px;
    padding:7px 13px;
    font-size:12.5px;
    font-weight:500;
    white-space:nowrap;
  }
  nav button.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  main{padding:12px 14px;max-width:480px;margin:0 auto;}
  .view{display:none;}
  .view.active{display:block;}
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:10px;
  }
  .card h2{font-size:13px;font-weight:600;margin:0 0 10px;color:var(--text2);text-transform:uppercase;letter-spacing:.03em;}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .big{font-size:22px;font-weight:700;}
  .label{font-size:12px;color:var(--text2);}
  .sub{font-size:12px;color:var(--text3);}
  .bar{height:8px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:6px;}
  .bar > div{height:100%;border-radius:4px;}
  .pill{
    display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;
  }
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  input, select{
    width:100%;
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:8px;
    padding:9px 10px;
    font-size:14px;
  }
  input:focus, select:focus{outline:2px solid var(--accent);outline-offset:1px;}
  label{font-size:11.5px;color:var(--text2);display:block;margin-bottom:4px;}
  button{
    background:var(--panel2);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    font-size:13.5px;
    font-weight:500;
  }
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.ghost{background:transparent;}
  button:active{transform:scale(0.98);}
  .stepbtn{width:42px;height:42px;font-size:18px;font-weight:700;border-radius:8px;}
  .toast{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#06200f;padding:8px 16px;border-radius:20px;
    font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;
    z-index:50;
  }
  .toast.show{opacity:1;}
  .unit-card{border-left:3px solid var(--accent);}
  .stage-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:8px;}
  .stage-chip{background:var(--panel2);border-radius:8px;padding:7px 9px;}
  .stage-chip .nm{font-size:11px;color:var(--text2);}
  .stage-chip .vl{font-size:14px;font-weight:600;}
  .lockbox{
    background:var(--panel2);border:1px dashed var(--border);border-radius:var(--radius);
    padding:18px;text-align:center;
  }
  .deleteBtn{color:var(--red);border-color:var(--red);}
  .flexrow{display:flex;gap:8px;align-items:center;}
  hr.sep{border:none;border-top:1px solid var(--border);margin:12px 0;}
  .smallnote{font-size:11px;color:var(--text3);margin-top:4px;}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <h1 id="turnoTitle">Tablero de almacén</h1>
    <span class="updated" id="updatedAt">sin actualizar</span>
  </div>
  <nav id="tabs">
    <button data-view="resumen" class="active">Resumen</button>
    <button data-view="picking">Picking</button>
    <button data-view="albaranes">Albaranes</button>
    <button data-view="embarques">Trailers/Tortones</button>
    <button data-view="camionetas">Camionetas</button>
    <button data-view="ferretero">Ferretero</button>
    <button data-view="ciclos">Tiempos ciclo</button>
  </nav>
</header>

<main>
  <div class="view active" id="view-resumen"></div>
  <div class="view" id="view-picking"></div>
  <div class="view" id="view-albaranes"></div>
  <div class="view" id="view-embarques"></div>
  <div class="view" id="view-camionetas"></div>
  <div class="view" id="view-ferretero"></div>
  <div class="view" id="view-ciclos"></div>
</main>

<div class="toast" id="toast">Guardado</div>

<script type="module" src="firebase-app.js"></script>
</body>
</html>
